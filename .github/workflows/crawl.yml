name: Crawl Calendars

on:
  schedule:
    - cron: "30 4 * * *" # 4:30 daily
  workflow_dispatch:     # Manual execution

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Checkout crawled branch
        uses: actions/checkout@v6
        with:
          ref: crawled
          path: crawled
      - name: Install Poetry
        run: pipx install poetry
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'poetry'
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Resolve latest Camoufox version
        id: camoufox-version
        shell: bash
        run: |
          echo "version=$(poetry run python -c 'from camoufox.pkgman import CamoufoxFetcher; print(CamoufoxFetcher().verstr)')" >> "$GITHUB_OUTPUT"
      - name: Cache Camoufox browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-${{ steps.camoufox-version.outputs.version }}
      - name: Fetch Camoufox browser
        run: poetry run python -m camoufox fetch
      - name: Run crawler
        run: poetry run python -u -m event_crawler.main --output crawled/events.json
      - name: Push crawler output to crawled branch
        uses: actions-js/push@v1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: crawled
          directory: crawled
          force: true
          amend: true
          message: "Update crawled data"
