name: Crawl Calendars

on:
  schedule:
    - cron: "30 4 * * *" # 4:30 daily
  workflow_dispatch:     # Manual execution

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout crawled branch
        uses: actions/checkout@v5
        with:
          ref: crawled
          path: crawled
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Fetch Camoufox browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          poetry run python - <<'PY'
          import os
          from unittest.mock import patch

          import requests
          from camoufox.pkgman import CamoufoxFetcher

          token = os.environ["GITHUB_TOKEN"]
          original_get = requests.get

          def auth_get(url, *args, **kwargs):
              headers = dict(kwargs.pop("headers", {}))
              headers.setdefault("Authorization", f"token {token}")
              headers.setdefault("Accept", "application/vnd.github+json")
              kwargs["headers"] = headers
              return original_get(url, *args, **kwargs)

          with patch("camoufox.pkgman.requests.get", side_effect=auth_get):
              CamoufoxFetcher().install()
          PY
      - name: Run crawler
        run: poetry run python -m event_crawler.main --output crawled/events.json
      - name: Commit and push crawler output
        run: |
          set -euo pipefail
          git -C crawled config user.name "github-actions[bot]"
          git -C crawled config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C crawled add events.json
          if git -C crawled diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git -C crawled commit -m "Update crawled data"
          git -C crawled push origin HEAD:crawled
