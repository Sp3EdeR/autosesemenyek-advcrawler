name: Crawl Calendars

on:
  schedule:
    - cron: "30 4 * * *" # 4:30 daily
  workflow_dispatch:     # Manual execution

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Checkout crawled branch
        uses: actions/checkout@v6
        with:
          ref: crawled
          path: crawled
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Fetch Camoufox browser
        run: poetry run python -m camoufox fetch
      - name: Run crawler
        run: poetry run python -u -m event_crawler.main --output crawled/events.json
      - name: Push crawler output to crawled branch
        uses: actions-js/push@v1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: crawled
          directory: crawled
          force: true
          amend: true
          message: "Update crawled data"
